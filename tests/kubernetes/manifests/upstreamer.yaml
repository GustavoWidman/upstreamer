apiVersion: v1
kind: ConfigMap
metadata:
  name: upstreamer-config
data:
  upstreamer.toml: |
    listen = "0.0.0.0:8080"
    metrics_addr = "0.0.0.0:9090"

    [health]
    [health.active]
    enabled = true
    interval = "5s"
    timeout = "3s"
    healthy_threshold = 2
    unhealthy_threshold = 3

    [health.passive]
    enabled = true
    failure_threshold = 5
    success_threshold = 2
    observation_window = "60s"

    [[routes]]
    match_path = "/"
    lb_algorithm = "round_robin"

    [routes.ratelimit]
    rate = 10
    burst = 10

    [[routes.pools]]
    name = "backend"

    [[routes.pools.origins]]
    url = "http://backend:80"

    [kubernetes]
    namespace = "default"
    label_selector = "app=backend"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: upstreamer
  labels:
    app: upstreamer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upstreamer
  template:
    metadata:
      labels:
        app: upstreamer
    spec:
      containers:
        - name: upstreamer
          image: upstreamer:latest
          imagePullPolicy: Never
          args: ["--config", "/etc/upstreamer/upstreamer.toml"]
          ports:
            - containerPort: 8080
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/upstreamer
      volumes:
        - name: config
          configMap:
            name: upstreamer-config
---
apiVersion: v1
kind: Service
metadata:
  name: upstreamer
spec:
  selector:
    app: upstreamer
  ports:
    - name: proxy
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9090
      targetPort: 9090
