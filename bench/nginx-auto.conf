daemon off;
error_log /dev/stderr warn;
pid nginx-auto.pid;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    access_log off;

    upstream backend {
        server 127.0.0.1:18080;
        keepalive 64;
    }

    server {
        listen 127.0.0.1:19082;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        location / {
            proxy_pass http://backend;
        }
    }
}
